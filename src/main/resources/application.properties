spring.application.name=iot

spring.jpa.hibernate.ddl-auto=update
spring.datasource.url=jdbc:mysql://localhost:3306/smarthome
spring.datasource.username=root
spring.datasource.password=123456
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.show-sql=true


#config view engine
# spring.mvc.view.prefix=/WEB-INF/view/
# spring.mvc.view.suffix=.jsp

#default = 1MB 
spring.servlet.multipart.max-file-size=50MB   
 
#default = 10 MB (form data) 
spring.servlet.multipart.max-request-size=50MB

#config session
spring.session.store-type=jdbc
spring.session.timeout=30m
spring.session.jdbc.initialize-schema=always
#server.servlet.session.timeout
#spring.session.jdbc.table-name=SPRING_SESSION

# MQTT Configuration
mqtt.enabled=true
mqtt.broker.url=tcp://broker1.loapay.vn
mqtt.client.id=test
mqtt.username=chienpt_mqtt
mqtt.password=chienPTMqttTT1@1

# Topics Server → ESP32 (publish lệnh điều khiển)
mqtt.topic.command=smarthome/device/%d/command

# Topics ESP32 → Server (subscribe nhận từ ESP32)
# ESP32 publish device status sau khi thực thi lệnh
mqtt.topic.status=smarthome/device/+/status
# ESP32 publish sensor data định kỳ
mqtt.topic.sensor.data=smarthome/sensor/+/data


# Extended topics for monitor/tracking
mqtt.topic.device.availability=smarthome/device/+/availability
# mqtt.topic.device.command.ack=smarthome/device/+/command/ack
mqtt.topic.device.command.error=smarthome/device/+/command/error
# mqtt.topic.device.telemetry=smarthome/device/+/telemetry
mqtt.topic.sensor.alert=smarthome/sensor/+/alert
# mqtt.topic.system.heartbeat=smarthome/system/+/heartbeat